<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saujana - Darkroom Dispatch</title>
  
  <!-- App Icons -->
  <link rel="icon" type="image/png" href="dd-icon.png" />
  <link rel="apple-touch-icon" href="dd-icon.png" />

  <!-- WhatsApp Link Preview -->
  <meta property="og:title" content="Saujana - Darkroom Dispatch" />
  <meta property="og:description" content="Film Lab Bali · Operations Dashboard" />
  <meta property="og:image" content="https://saujana-filmlab.github.io/saujana-scans/saujana-dd.png" />
  <meta property="og:url" content="https://saujana-filmlab.github.io/saujana-scans/saujana-dispatch.html" />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --black:#080a0f;--dark:#0d1117;--card:#111720;--card2:#161e2a;
      --border:#1e2d42;--border2:#253448;
      --blue:#1a6fa8;--blue-l:#2a8fd0;--blue-gl:#1b3a5c;--ocean:#0e4d7a;
      --gold:#c8922a;--gold-l:#e8b84b;
      --white:#f4f6fa;--light:#c8d4e0;--muted:#5a7080;--dim:#2a3a4a;
      --green:#25d366;--greenD:#0d1f12;--greenB:#1a4028;--greenT:#5dd88a;
      --red:#e05040;
    }
    body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--dark);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
    input,textarea{
      width:100%;background:var(--dark);border:1px solid var(--border);border-radius:2px;
      padding:12px 14px;color:var(--white);font-family:'Montserrat',sans-serif;
      font-size:13px;font-weight:300;outline:none;transition:border-color 0.2s;
    }
    input:focus,textarea:focus{border-color:var(--blue-l);}
    input::placeholder,textarea::placeholder{color:var(--dim);}
    button{cursor:pointer;font-family:'Montserrat',sans-serif;}
    a{text-decoration:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = "https://script.google.com/macros/s/AKfycbyCCkm0VIH6jsuj6T68KktBiHgE3IKnDQEOgEogRExKxmQ4WHXaW9wK4C9gZ2hhlfk/exec";
const BASE_URL = "https://saujana-filmlab.github.io/saujana-scans";
const PASSWORD = "8888";

async function apiCall(action, data=null) {
  try {
    if (data) {
      const r = await fetch(`${API}?action=${action}`, {method:"POST", body:JSON.stringify(data)});
      return await r.json();
    }
    return await (await fetch(`${API}?action=${action}`)).json();
  } catch(e) { return {error:e.toString()}; }
}

const fmtDate = ts => ts ? new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtDT   = ts => {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"}) + " · " +
         d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
};

// ── Styles ────────────────────────────────────────────────
const css = {
  btn: (variant="primary") => ({
    padding:"11px 20px", borderRadius:2, border:"none", fontFamily:"'Montserrat',sans-serif",
    fontSize:10, fontWeight:600, letterSpacing:"0.2em", textTransform:"uppercase",
    transition:"all 0.2s", cursor:"pointer",
    ...(variant==="primary" ? {background:"var(--white)", color:"var(--black)"} :
        variant==="blue"    ? {background:"var(--ocean)", color:"var(--white)", border:"1px solid var(--blue)"} :
        variant==="ghost"   ? {background:"var(--card2)", color:"var(--light)", border:"1px solid var(--border2)"} :
        variant==="green"   ? {background:"var(--greenD)", color:"var(--greenT)", border:"1px solid var(--greenB)"} :
        variant==="danger"  ? {background:"none", color:"#5a2a22", border:"1px solid var(--border)"} : {})
  }),
  card: {background:"var(--card)", border:"1px solid var(--border)", borderRadius:3, padding:24},
  label: {fontSize:9, letterSpacing:"0.35em", textTransform:"uppercase", color:"var(--muted)", marginBottom:8, display:"block"},
  secLabel: {fontSize:9, letterSpacing:"0.4em", textTransform:"uppercase", color:"var(--muted)", marginBottom:16, display:"block"},
};

// ── Toast ─────────────────────────────────────────────────
function Toast({msg}) {
  return msg ? (
    <div style={{position:"fixed",bottom:24,right:24,background:"var(--card)",
      border:"1px solid var(--blue)",borderRadius:3,padding:"12px 20px",
      fontSize:12,color:"var(--blue-l)",zIndex:999}}>
      {msg}
    </div>
  ) : null;
}

// ── Lock Screen ───────────────────────────────────────────
function LockScreen({onUnlock}) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");

  function check() {
    if (pw === PASSWORD) { sessionStorage.setItem("saujana-auth","1"); onUnlock(); }
    else { setErr("Incorrect password"); setPw(""); setTimeout(()=>setErr(""),2500); }
  }

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                 minHeight:"100vh",background:"var(--black)",padding:24}}>
      
      <div style={{textAlign:"center", marginBottom: 40}}>
        <img src="saujana-dd.png" alt="Darkroom Dispatch Logo" style={{height: 180, maxWidth:"100%", objectFit:"contain", marginBottom: 16}}/>
        <div style={{fontSize:10,letterSpacing:"0.4em",textTransform:"uppercase",
                     color:"var(--muted)"}}>Film Lab Bali · Operations</div>
      </div>

      <div style={{width:"100%",maxWidth:320,background:"var(--card)",
                   border:"1px solid var(--border)", borderRadius:3,padding:"30px",textAlign:"center"}}>
        <div style={{fontSize:11,letterSpacing:"0.3em",textTransform:"uppercase",
                     color:"var(--light)",marginBottom:20}}>Staff Access Only</div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&check()}
          placeholder="••••••••"
          style={{textAlign:"center",fontSize:18,fontWeight:500,letterSpacing:"0.3em",marginBottom:12}}/>
        <button onClick={check} style={{...css.btn("blue"),width:"100%",padding:13}}>Enter</button>
        <div style={{fontSize:11,color:"var(--red)",marginTop:10,minHeight:16}}>{err}</div>
      </div>
    </div>
  );
}

// ── Dispatch Tab ──────────────────────────────────────────
function Dispatch({customers, onOrderSaved, prefill, clearPrefill}) {
  const [orderNo, setOrderNo]     = useState("");
  const [custInput, setCustInput] = useState("");
  const [selCust, setSelCust]     = useState(null);
  const [custEmail, setCustEmail] = useState("");
  const [rolls, setRolls]         = useState([""]);
  const [driveLink, setDriveLink] = useState("");
  const [notes, setNotes]         = useState("");
  const [result, setResult]       = useState(null);
  const [shortUrl, setShortUrl]   = useState(null);
  const [shortening, setShortening] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [showDrop, setShowDrop]   = useState(false);
  const [copied, setCopied]       = useState({});
  const [toast, setToast]         = useState("");
  const dropRef = useRef();

  useEffect(() => {
    if (prefill) {
      setSelCust(prefill);
      setCustInput(prefill.name || "");
      setCustEmail(prefill.email || "");
      if (clearPrefill) clearPrefill();
    }
  }, [prefill, clearPrefill]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2500); };

 const matches = custInput.length > 0 && !selCust
    ? customers.filter(c => {
        const q = custInput.toLowerCase();
        return String(c.name || "").toLowerCase().includes(q) ||
               String(c.email || "").toLowerCase().includes(q) ||
               String(c.phone || "").toLowerCase().includes(q);
      }).slice(0,8)
    : [];

  function selectCust(c) {
    setSelCust(c); setCustInput(c.name); setCustEmail(c.email); setShowDrop(false);
  }

  function clearCust() {
    setSelCust(null); setCustInput(""); setCustEmail("");
  }

  function addRoll()        { setRolls(r=>[...r,""]); }
  function updateRoll(i,v)  { setRolls(r=>r.map((x,j)=>j===i?v:x)); }
  function removeRoll(i)    { setRolls(r=>r.filter((_,j)=>j!==i)); }

  async function generate() {
    const film = rolls.filter(Boolean).join(" · ");
    if (!orderNo.trim()||!film||!driveLink.trim()) return;
    setGenerating(true);
    const name = selCust ? selCust.name : (custInput.trim()||"Customer");
    const url = `${BASE_URL}?order=${encodeURIComponent(orderNo)}&name=${encodeURIComponent(name)}&film=${encodeURIComponent(film)}&link=${encodeURIComponent(driveLink)}${notes?"&notes="+encodeURIComponent(notes):""}`;
    const saved = await apiCall("addOrder",{
      orderNumber:orderNo.trim().toUpperCase(), customerId:selCust?.id||"",
      customerName:name, film, notes:notes.trim(), driveLink:driveLink.trim(),
    });
    onOrderSaved(saved, selCust?.id);
    setResult({url, custName:name, orderNumber:orderNo.trim().toUpperCase(), film});
    setShortUrl(null); setCopied({}); setGenerating(false);
    showToast("Order saved to Sheets ✓");
  }

  async function shorten() {
    if (!result) return;
    setShortening(true);
    const alias = "saujanabali-"+result.orderNumber.replace(/[^a-zA-Z0-9-]/g,"-");
    try {
      const r = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(result.url)}&alias=${encodeURIComponent(alias)}`);
      const txt = await r.text();
      if (txt.startsWith("https://")) { setShortUrl(txt.trim()); setShortening(false); return; }
      const r2 = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(result.url)}`);
      setShortUrl((await r2.text()).trim());
    } catch {}
    setShortening(false);
  }

  function copyText(text, key) {
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(c=>({...c,[key]:true}));
      showToast("Copied!");
      setTimeout(()=>setCopied(c=>({...c,[key]:false})),2000);
    });
  }

  async function copyRich() {
    if (!result) return;
    const r = result;
    const html = `<p>Hi <strong>${r.custName}</strong>! Your scans are ready 🎞️</p><br><p><strong>Order Number: ${r.orderNumber}</strong></p><br><p><a href="${r.url}"><strong>Get your scans here →</strong></a></p><br><p>Link active for <strong>7 days</strong>. Quote order number when collecting negatives.</p><br><p>Questions? <a href="https://wa.me/6282251318377"><strong>WhatsApp: +62 822 5131 8377</strong></a></p><br><p>Kind regards,<br><strong>Saujana Film Lab</strong><br>Bali, Indonesia</p>`;
    await navigator.clipboard.write([new ClipboardItem({"text/html":new Blob([html],{type:"text/html"})})]);
    showToast("Rich email copied — paste into Gmail!");
  }

  function openGmail() {
    if (!result) return;
    const r = result;
    const sub = encodeURIComponent(`[${r.orderNumber}] Your scans are ready - Saujana Film Lab Bali`);
    const body = encodeURIComponent(`Hi ${r.custName}! Your scans are ready 🎞️\n\nOrder: ${r.orderNumber}\n\nClick the link below to access your personalised delivery page:\n${r.url}\n\nLink active for 7 days. Quote order number when collecting negatives.\n\nQuestions? WhatsApp us at +62 822 5131 8377\n\nKind regards,\nSaujana Film Lab\nBali, Indonesia`);
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${custEmail?encodeURIComponent(custEmail):""}&su=${sub}&body=${body}`,"_blank");
  }

function copyWhatsApp() {
    if (!result || !shortUrl) return;
    const text = `Hi ${result.custName}! Your scans are ready 🎞️\n\nOrder Number: ${result.orderNumber}\n\nGet your scans here:\n${shortUrl}\n\nLink active for 7 days. Quote order number when collecting negatives.\n\nSaujana Film Lab Bali`;
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(c=>({...c, wa:true}));
      showToast("WhatsApp text copied!");
      setTimeout(()=>setCopied(c=>({...c, wa:false})), 2000);
    });
  }

  const canGen = orderNo.trim() && rolls.some(Boolean) && driveLink.trim();

  return (
    <div style={{display:"flex",gap:16,height:"calc(100vh - 130px)"}}>
      <Toast msg={toast}/>

      {/* Form */}
      <div style={{width:400,flexShrink:0,overflowY:"auto"}}>
        <div style={css.card}>
          <span style={css.secLabel}>New Order</span>

          {/* Order number */}
          <div style={{marginBottom:18}}>
            <label style={css.label}>Order Number</label>
            <input value={orderNo} onChange={e=>setOrderNo(e.target.value)} placeholder="e.g. SB-001"/>
          </div>

          {/* Customer search */}
          <div style={{marginBottom:18, position:"relative"}}>
            <label style={css.label}>Customer</label>
            <input
              value={custInput}
              onChange={e=>{setCustInput(e.target.value); setSelCust(null); setCustEmail(""); setShowDrop(true);}}
              onFocus={()=>setShowDrop(true)}
              onBlur={()=>setTimeout(()=>setShowDrop(false),200)}
              placeholder="Type to search or enter name…"/>

            {showDrop && matches.length>0 && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:99,
                           background:"var(--card2)",border:"1px solid var(--border2)",
                           borderTop:"none",borderRadius:"0 0 3px 3px",
                           maxHeight:240,overflowY:"auto",boxShadow:"0 12px 32px rgba(0,0,0,0.5)"}}>
                {matches.map(c=>(
                  <div key={c.id} onMouseDown={()=>selectCust(c)}
                    style={{padding:"11px 14px",cursor:"pointer",borderBottom:"1px solid var(--border)",
                            transition:"background 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--blue-gl)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:13,color:"var(--white)"}}>{c.name}</div>
                        <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>
                          {c.email}{c.phone?` · ${c.phone}`:""}
                        </div>
                      </div>
                      {c.totalOrders>0&&<span style={{fontSize:9,background:"var(--ocean)",
                        color:"var(--white)",padding:"2px 8px",borderRadius:10,fontWeight:700}}>
                        {c.totalOrders}×</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {selCust && (
              <div style={{marginTop:8,padding:"9px 14px",background:"var(--blue-gl)",
                           border:"1px solid var(--blue)",borderRadius:2,
                           display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontSize:12,color:"var(--blue-l)",fontWeight:500}}>{selCust.name}</span>
                  <span style={{fontSize:11,color:"var(--muted)",marginLeft:8}}>{selCust.email}</span>
                  {selCust.totalOrders>0&&<span style={{fontSize:10,color:"var(--muted)",marginLeft:8}}>
                    {selCust.totalOrders} prev. order{selCust.totalOrders!==1?"s":""}</span>}
                </div>
                <button onClick={clearCust}
                  style={{background:"none",border:"none",color:"var(--muted)",fontSize:16}}>×</button>
              </div>
            )}
          </div>

          {/* Email */}
          <div style={{marginBottom:18}}>
            <label style={css.label}>Customer Email <span style={{color:"var(--dim)",fontSize:9}}>for Gmail</span></label>
            <input value={custEmail} onChange={e=>setCustEmail(e.target.value)} placeholder="auto-filled from customer"/>
          </div>

          {/* Rolls */}
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <label style={{...css.label,marginBottom:0}}>Film Rolls</label>
              <button onClick={addRoll} style={{...css.btn("ghost"),padding:"5px 10px",fontSize:9}}>+ Add Roll</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {rolls.map((r,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={r} onChange={e=>updateRoll(i,e.target.value)}
                    placeholder={`Roll ${i+1} — e.g. Portra 400 · 35mm`} style={{flex:1}}/>
                  {rolls.length>1&&<button onClick={()=>removeRoll(i)}
                    style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,padding:"0 4px"}}>×</button>}
                </div>
              ))}
            </div>
          </div>

          {/* Drive link */}
          <div style={{marginBottom:18}}>
            <label style={css.label}>Google Drive Link</label>
            <input value={driveLink} onChange={e=>setDriveLink(e.target.value)} placeholder="Paste Drive folder link"/>
          </div>

          {/* Notes */}
          <div style={{marginBottom:24}}>
            <label style={css.label}>Order Notes <span style={{color:"var(--dim)",fontSize:9}}>optional</span></label>
            <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. handle with care"/>
          </div>

          <button onClick={generate} disabled={!canGen||generating}
            style={{...css.btn("blue"),width:"100%",padding:14,opacity:canGen&&!generating?1:0.4}}>
            {generating?"Saving…":"Generate Delivery Link"}
          </button>
        </div>
      </div>

      {/* Result */}
      <div style={{flex:1,minWidth:0,overflowY:"auto"}}>
        {result ? (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={css.card}>
              <span style={css.secLabel}>Delivery Page Link</span>
              <div onClick={()=>copyText(result.url,"url")} style={{background:"var(--dark)",
                border:"1px solid var(--border)",borderRadius:2,padding:"13px 16px",
                fontSize:11,color:"var(--blue-l)",wordBreak:"break-all",lineHeight:1.6,
                cursor:"pointer",marginBottom:10}}>
                {result.url}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <button onClick={()=>copyText(result.url,"url")} style={{...css.btn(),padding:11}}>
                  {copied.url?"Copied ✓":"Copy Link"}
                </button>
                <a href={result.url} target="_blank" rel="noopener"
                  style={{...css.btn("ghost"),padding:11,display:"block",textAlign:"center",color:"var(--light)"}}>
                  Preview →
                </a>
              </div>
              <button onClick={shorten} disabled={shortening}
                style={{...css.btn("ghost"),width:"100%",padding:11}}>
                {shortening?"Shortening…":"Shorten for WhatsApp / DM"}
              </button>
              {shortUrl&&(
                <div style={{marginTop:10}}>
                  <span style={{...css.secLabel,marginTop:10}}>Short Link</span>
                  <div onClick={()=>copyText(shortUrl,"short")} style={{background:"var(--dark)",
                    border:"1px solid var(--border)",borderRadius:2,padding:"12px 16px",
                    fontSize:12,color:"var(--blue-l)",cursor:"pointer",marginBottom:8}}>
                    {shortUrl}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>copyText(shortUrl,"short")}
                      style={{...css.btn(),width:"100%",padding:11}}>
                      {copied.short?"Copied ✓":"Copy Link"}
                    </button>
                    <button onClick={copyWhatsApp}
                      style={{...css.btn("ghost"),width:"100%",padding:11}}>
                      {copied.wa?"Copied ✓":"Copy for WA"}
                    </button>
                  </div>
                </div>
              )}
            </div>

            <div style={css.card}>
              <span style={css.secLabel}>Email</span>
              <div style={{fontSize:12,lineHeight:1.9,color:"var(--light)",background:"var(--dark)",
                           border:"1px solid var(--border)",borderRadius:2,padding:18,marginBottom:12}}>
                Hi <strong style={{color:"var(--white)"}}>{result.custName}</strong>! Your scans are ready 🎞️<br/><br/>
                <strong style={{color:"var(--white)"}}>Order Number: {result.orderNumber}</strong><br/><br/>
                Click below to access your personalised delivery page:<br/><br/>
                <span style={{color:"var(--blue-l)",textDecoration:"underline"}}>Get your scans here →</span><br/><br/>
                Link active for <strong style={{color:"var(--white)"}}>7 days</strong>. Quote order number when collecting negatives.<br/><br/>
                Questions? WhatsApp us at <strong style={{color:"var(--white)"}}>+62 822 5131 8377</strong><br/><br/>
                Kind regards,<br/>
                <strong style={{color:"var(--white)"}}>Saujana Film Lab</strong><br/>Bali, Indonesia
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <button onClick={copyRich} style={{...css.btn(),padding:11}}>Copy for Gmail</button>
                <button onClick={openGmail} style={{...css.btn("ghost"),padding:11}}>Open in Gmail ↗</button>
              </div>
            </div>
          </div>
        ) : (
          <div style={{...css.card,height:"100%",display:"flex",alignItems:"center",
                       justifyContent:"center",flexDirection:"column",gap:10}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontStyle:"italic",color:"var(--dim)"}}>
              Ready to dispatch
            </div>
            <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.3em",textTransform:"uppercase"}}>
              Fill in the form to generate a delivery link
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Registry Tab ──────────────────────────────────────────
function Registry({customers, orders, onAdd, onUpdate, onDelete, onNewOrderFor}) {
  const [search, setSearch]       = useState("");
  const [sortBy, setSortBy]       = useState("name");
  const [selected, setSelected]   = useState(null);
  const [editing, setEditing]     = useState(null);
  const [form, setForm]           = useState({name:"",email:"",phone:""});
  const [saving, setSaving]       = useState(false);
  const [toast, setToast]         = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2500); };

  const filtered = customers
    .filter(c=>{
      const q=search.toLowerCase();
      return c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||(c.phone&&c.phone.includes(q));
    })
    .sort((a,b)=>
      sortBy==="orders"?(b.totalOrders||0)-(a.totalOrders||0):
      sortBy==="recent"?(b.lastOrderDate||0)-(a.lastOrderDate||0):
      a.name.localeCompare(b.name)
    );

  const custOrders = selected
    ? orders.filter(o=>o.customerId===selected.id).sort((a,b)=>b.createdAt-a.createdAt)
    : [];

  async function save() {
    if (!form.name.trim()||!form.email.trim()) return;
    setSaving(true);
    if (editing==="new") {
      await onAdd(form);
      showToast("Customer added ✓");
    } else {
      await onUpdate({...editing,...form});
      showToast("Updated ✓");
    }
    setEditing(null); setSaving(false);
  }

  async function del(id) {
    if (!confirm("Remove this customer?")) return;
    await onDelete(id);
    if (selected?.id===id) setSelected(null);
    showToast("Removed");
  }

  return (
    <div style={{display:"flex",gap:16,height:"calc(100vh - 130px)"}}>
      <Toast msg={toast}/>

      {/* Left */}
      <div style={{width:380,flexShrink:0,display:"flex",flexDirection:"column",gap:10,overflowY:"auto"}}>
        {/* Search + Add */}
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search name, email or phone…" style={{flex:1,fontSize:12}}/>
          <button onClick={()=>{setEditing("new");setForm({name:"",email:"",phone:""}); }}
            style={{...css.btn("blue"),padding:"11px 14px",whiteSpace:"nowrap"}}>+ Add</button>
        </div>

        {/* Sort */}
        <div style={{display:"flex",gap:6}}>
          {[{id:"name",l:"A–Z"},{id:"orders",l:"Most Orders"},{id:"recent",l:"Recent"}].map(s=>(
            <button key={s.id} onClick={()=>setSortBy(s.id)} style={{
              flex:1,padding:7,background:"none",fontFamily:"'Montserrat',sans-serif",
              border:`1px solid ${sortBy===s.id?"var(--blue-l)":"var(--border)"}`,borderRadius:2,
              color:sortBy===s.id?"var(--blue-l)":"var(--muted)",
              fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer",
            }}>{s.l}</button>
          ))}
        </div>

        {/* Add/Edit form */}
        {editing&&(
          <div style={{background:"var(--dark)",border:"1px solid var(--blue)",
                       borderTop:"2px solid var(--blue-l)",borderRadius:3,padding:18}}>
            <span style={{...css.secLabel,color:"var(--blue-l)"}}>
              {editing==="new"?"New Customer":"Edit Customer"}
            </span>
            {[{id:"name",l:"Name *",ph:"Full name"},
              {id:"email",l:"Email *",ph:"email@example.com"},
              {id:"phone",l:"Phone (optional)",ph:"+62 …"}].map(f=>(
              <div key={f.id} style={{marginBottom:10}}>
                <label style={css.label}>{f.l}</label>
                <input value={form[f.id]} onChange={e=>setForm(p=>({...p,[f.id]:e.target.value}))}
                  placeholder={f.ph} onKeyDown={e=>e.key==="Enter"&&save()}/>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={save} disabled={saving}
                style={{...css.btn("blue"),flex:1}}>{saving?"Saving…":"Save"}</button>
              <button onClick={()=>setEditing(null)}
                style={{...css.btn("ghost"),flex:1}}>Cancel</button>
            </div>
          </div>
        )}

        {/* Count */}
        <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.25em",textTransform:"uppercase"}}>
          {filtered.length} customer{filtered.length!==1?"s":""}{search?` · "${search}"`:""}
        </div>

        {/* List */}
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontStyle:"italic",color:"var(--dim)",marginBottom:8}}>
                {search?"No results":"Empty"}
              </div>
              <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.2em",textTransform:"uppercase"}}>
                {search?"Try a different search":"Add your first customer"}
              </div>
            </div>
          ) : filtered.map(c=>(
            <div key={c.id} onClick={()=>setSelected(c)}
              style={{background:selected?.id===c.id?"var(--blue-gl)":"var(--card)",
                border:`1px solid ${selected?.id===c.id?"var(--blue)":"var(--border)"}`,
                borderLeft:`3px solid ${selected?.id===c.id?"var(--blue-l)":"var(--border)"}`,
                borderRadius:2,padding:"14px 16px",cursor:"pointer",marginBottom:6,transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontStyle:"italic",
                      color:selected?.id===c.id?"var(--blue-l)":"var(--white)"}}>{c.name}</span>
                    {c.totalOrders>0&&<span style={{fontSize:9,background:"var(--ocean)",color:"var(--white)",
                      padding:"2px 8px",borderRadius:10,fontWeight:700}}>{c.totalOrders}×</span>}
                  </div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>
                    {c.email}{c.phone?` · ${c.phone}`:""}
                  </div>
                  {c.lastOrderDate&&<div style={{fontSize:10,color:"var(--dim)",marginTop:3}}>
                    Last: {fmtDate(c.lastOrderDate)}
                  </div>}
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={e=>{e.stopPropagation();setEditing(c);setForm({name:c.name,email:c.email,phone:c.phone||""});}}
                    style={{...css.btn("ghost"),padding:"4px 10px",fontSize:10}}>Edit</button>
                  <button onClick={e=>{e.stopPropagation();del(c.id);}}
                    style={{...css.btn("danger"),padding:"4px 10px",fontSize:10}}>×</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Right: Detail */}
      <div style={{flex:1,minWidth:0}}>
        {selected ? (
          <div style={{...css.card,height:"100%",display:"flex",flexDirection:"column"}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontStyle:"italic",color:"var(--white)"}}>
                  {selected.name}
                </div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{selected.email}</div>
                {selected.phone&&<div style={{fontSize:12,color:"var(--muted)"}}>{selected.phone}</div>}
                <div style={{fontSize:10,color:"var(--dim)",marginTop:6}}>Member since {fmtDate(selected.createdAt)}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>onNewOrderFor(selected)}
                  style={{...css.btn("green"),fontSize:9,padding:"10px 16px"}}>+ New Order</button>
                <button onClick={()=>setSelected(null)}
                  style={{background:"none",border:"1px solid var(--border)",borderRadius:2,
                          color:"var(--muted)",fontSize:16,padding:"6px 12px"}}>×</button>
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {[{l:"Total Orders",v:String(selected.totalOrders||0)},
                {l:"Last Visit",v:fmtDate(selected.lastOrderDate)},
                {l:"Member Since",v:fmtDate(selected.createdAt)}].map(s=>(
                <div key={s.l} style={{flex:1,background:"var(--dark)",border:"1px solid var(--border)",
                                       borderRadius:2,padding:"12px 14px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--blue-l)",
                               fontFamily:"'Cormorant Garamond',serif"}}>{s.v}</div>
                  <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.2em",
                               textTransform:"uppercase",marginTop:4}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* Orders */}
            <span style={css.secLabel}>Order History</span>
            <div style={{flex:1,overflowY:"auto"}}>
              {custOrders.length===0 ? (
                <div style={{textAlign:"center",padding:32,color:"var(--dim)",fontSize:12}}>No orders yet</div>
              ) : custOrders.map(o=>(
                <div key={o.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",
                  background:"var(--dark)",border:"1px solid var(--border)",
                  borderLeft:"3px solid var(--blue)",borderRadius:2,marginBottom:6}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,
                        color:"var(--white)",letterSpacing:"0.05em"}}>{o.orderNumber}</span>
                      <span style={{fontSize:11,color:"var(--muted)"}}>{o.film}</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--dim)",marginTop:3}}>{fmtDT(o.createdAt)}</div>
                  </div>
                  {o.notes&&<div style={{fontSize:10,color:"var(--muted)",maxWidth:160,textAlign:"right"}}>{o.notes}</div>}
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{...css.card,height:"100%",display:"flex",alignItems:"center",
                       justifyContent:"center",flexDirection:"column",gap:10}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontStyle:"italic",color:"var(--dim)"}}>
              Select a customer
            </div>
            <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.3em",textTransform:"uppercase"}}>
              to view their profile and order history
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────
function App() {
  const [authed, setAuthed]       = useState(sessionStorage.getItem("saujana-auth")==="1");
  const [tab, setTab]             = useState("dispatch");
  const [customers, setCustomers] = useState([]);
  const [orders, setOrders]       = useState([]);
  const [loading, setLoading]     = useState(true);
  const [syncing, setSyncing]     = useState(false);
  const [prefill, setPrefill]     = useState(null);

  async function load() {
    setLoading(true);
    const [c,o] = await Promise.all([apiCall("getCustomers"),apiCall("getOrders")]);
    setCustomers(Array.isArray(c)?c:[]);
    setOrders(Array.isArray(o)?o:[]);
    setLoading(false);
  }

  useEffect(()=>{ if(authed) load(); },[authed]);

  async function handleAdd(form) {
    setSyncing(true);
    const nc = await apiCall("addCustomer",form);
    setCustomers(p=>[nc,...p]);
    setSyncing(false);
  }

  async function handleUpdate(c) {
    setSyncing(true);
    await apiCall("updateCustomer",c);
    setCustomers(p=>p.map(cu=>cu.id===c.id?{...cu,...c}:cu));
    setSyncing(false);
  }

  async function handleDelete(id) {
    setSyncing(true);
    await apiCall("deleteCustomer",id);
    setCustomers(p=>p.filter(c=>c.id!==id));
    setSyncing(false);
  }

  function handleOrderSaved(saved, custId) {
    setOrders(p=>[{...saved,createdAt:Date.now()},...p]);
    if (custId) {
      setCustomers(p=>p.map(c=>c.id===custId
        ?{...c,totalOrders:(c.totalOrders||0)+1,lastOrderDate:Date.now()}:c));
    }
  }

  function handleNewOrderFor(c) {
    setPrefill(c); setTab("dispatch");
  }

  if (!authed) return <LockScreen onUnlock={()=>setAuthed(true)}/>;

  return (
    <>
      {/* Header */}
      <div style={{background:"var(--dark)",borderBottom:"1px solid var(--border)",
                   padding:"0 24px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:14}}>
            <div>
              <img src="dd-horizontal.png" alt="Darkroom Dispatch Logo" style={{height:45, objectFit:"contain", display:"block"}}/>
              <div style={{fontSize:8,letterSpacing:"0.4em",textTransform:"uppercase",color:"var(--muted)",marginTop:8}}>
                Film Lab Bali · Operations
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {syncing&&<span style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.2em",textTransform:"uppercase"}}>Syncing…</span>}
              <button onClick={load} style={{...css.btn("ghost"),padding:"6px 12px",fontSize:9}}>↻ Refresh</button>
              <span style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.2em",textTransform:"uppercase"}}>
                {customers.length} customers · {orders.length} orders
              </span>
            </div>
          </div>
          <div style={{display:"flex",marginTop:10}}>
            {[{id:"dispatch",l:"Darkroom Dispatch"},{id:"registry",l:"Customer Registry"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"10px 24px",background:"none",
                border:"none",borderBottom:`2px solid ${tab===t.id?"var(--blue-l)":"transparent"}`,
                color:tab===t.id?"var(--white)":"var(--muted)",
                fontFamily:"'Montserrat',sans-serif",fontSize:10,
                fontWeight:tab===t.id?500:300,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer",
              }}>{t.l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 24px"}}>
        {loading ? (
          <div style={{textAlign:"center",padding:80,fontSize:11,letterSpacing:"0.3em",
                       textTransform:"uppercase",color:"var(--dim)"}}>
            Connecting to Google Sheets…
          </div>
        ) : tab==="dispatch" ? (
          <Dispatch customers={customers} onOrderSaved={handleOrderSaved}
            prefill={prefill} clearPrefill={()=>setPrefill(null)}/>
        ) : (
          <Registry customers={customers} orders={orders}
            onAdd={handleAdd} onUpdate={handleUpdate} onDelete={handleDelete}
            onNewOrderFor={handleNewOrderFor}/>
        )}
      </div>
    </>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
